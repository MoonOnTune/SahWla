services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sahwala
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    restart: unless-stopped
    environment:
      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_APP_SECRET}

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sahwala?schema=public
      SOKETI_HOST: ${SOKETI_HOST:-soketi}
      SOKETI_PORT: ${SOKETI_PORT:-6001}
      SOKETI_USE_TLS: ${SOKETI_USE_TLS:-false}
    depends_on:
      db:
        condition: service_started
      soketi:
        condition: service_started

  app:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.soketi.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      soketi:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod:
